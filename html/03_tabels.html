<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabels</title>
</head>
<body>
    <table>   <!-- table tag is used to create a table -->
        <tr>  <!-- tr is used to create a row in a table -->
            <td>Column 1</td>    <!-- td is used to create a cell in a table -->
            <td>Column 2</td>
            <td>Column 3</td>
        </tr>
    </table>
   
    <table border="10">   <!-- here we can also give border to the table by using border attribute -->
        <tr>
            <td>Column 1</td>
            <td>Column 2</td>
            <td>Column 3</td>
        </tr>

        <tr>
            <th>Name</th>
            <th>Skil</th>
            <th>age</th>
        </tr>

        <tr>
            <td>Anurag</td>
            <td>Web development</td>
            <td>21</td> 
        </tr>
            <tr>
                <td>Rohit</td>
                <td>Cricket</td>
                <td>35</td>
            </tr>    
    </table>
</body>
</html>
