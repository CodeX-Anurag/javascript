<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login Page</title>

    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        background-color :#1a1a1a;
        margin: 0;
        padding: 0;
        height:90vh;
        display: flex;
        justify-content :center ;
        align-items :center ;

      }

      .login{
        background-color:burlywood;
        border-radius: 10px;
        padding: 80px;
        width: 280px;
      }

      h1{
        color:indigo;
        text-align: center;
        margin-bottom: 10px;
      }
      h2{
        color: #1a1a1a;
        text-align: center;
      }

      form{
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding: 10px;
      }

      input{
        margin-bottom: 0px;
        border-radius: 3px;
        padding: 7px;
        background-color:lemonchiffon;
        color:#1a1a1a;
      }

      button{
            padding: 10px;
            border-radius: 8px;
            background-color:chartreuse;
            color:#1a1a1a;
      }

      button:hover{
        background-color: rgb(41, 179, 7)
      }
    </style>
</head>


<body>
    <div class="login">
        <h1> 👤Welocome Back</h1>
        <h2> Sign in to continue </h2>
          <form>
              <input type="username" name="username" id="username" placeholder="Enter you username"><br>
              <input type="email" name="email" id="email" placeholder="Enter you email"><br>
              <input type="password"name="password" id="password" placeholder="Enter you password"><br>
              
              Remember me :<input type="checkbox" name="" id="">
              <a href="forgot_password.html">Forgot Password?</a>
              <br></br>
  
              <button type="submit">Login</button>  <br>
  
              <p>
                  Don't have an account?
                  <a href="signup.html">Sign Up</a>
              </p>
         </form>
    </div>
</body>
</html>
